<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMING SOON | 코어드랩</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="icon" href="https://coredlab.cloud/favicon.ico?v=2" type="image/x-icon">
    <link rel="shortcut icon" href="https://coredlab.cloud/favicon.ico" type="image/x-icon">
    <link href="https://webfontworld.github.io/gmarket/GmarketSans.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2A38D6;
            --text-black: #111;
            --bg-color: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-black); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }

        /* 배경을 가득 채우는 거대한 흐르는 텍스트 */
        .marquee-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 1;
            opacity: 0.03; /* 아주 은은하게 */
            pointer-events: none;
            user-select: none;
        }

        .marquee-line {
            font-family: 'GmarketSans', sans-serif;
            font-size: 18vw;
            font-weight: 900;
            white-space: nowrap;
            line-height: 0.9;
            animation: moveText 60s linear infinite;
        }

        .marquee-line.reverse {
            animation: moveTextRev 50s linear infinite;
            color: var(--primary-blue);
        }

        @keyframes moveText { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes moveTextRev { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

        /* 중앙 컨텐츠 */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .label {
            font-family: 'GmarketSans', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary-blue);
            letter-spacing: 5px;
            margin-bottom: 20px;
            display: block;
            animation: fadeInDown 1s ease forwards;
        }

        .main-title {
            font-family: 'GmarketSans', sans-serif;
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }

        .main-title span {
            display: inline-block;
            opacity: 0;
            transform: translateY(50px);
            animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .desc {
            font-size: 1.2rem;
            font-weight: 500;
            color: #666;
            line-height: 1.6;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 1s ease 1s forwards;
        }

        /* 로딩 바 애니메이션 */
        .loading-container {
            width: 300px;
            height: 2px;
            background: #eee;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .loading-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 40%;
            height: 100%;
            background: var(--primary-blue);
            animation: loadingMove 2s infinite ease-in-out;
        }

        @keyframes revealUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes loadingMove { 
            0% { left: -40%; } 
            100% { left: 100%; } 
        }

        @media (max-width: 768px) {
            .main-title { font-size: 4rem; }
            .desc { font-size: 1rem; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div class="marquee-bg">
        <div class="marquee-line">UNDER CONSTRUCTION CORED LAB</div>
        <div class="marquee-line reverse">WE ARE COMING SOON DIGITAL STUDIO</div>
        <div class="marquee-line">CREATIVE EXPERIENCE WEB DESIGN</div>
    </div>

    <div class="content">
        <span class="label">LAUNCHING SOON</span>
        <h1 class="main-title">
            <span>더</span> <span>나은</span> <span>경험을</span><br>
            <span>준비</span> <span>중입니다</span>
        </h1>
        <p class="desc">
            코어드랩이 새로운 모습으로 찾아뵙기 위해<br>
            현재 사이트를 열심히 제작하고 있습니다. 조금만 기다려주세요!
        </p>
        
        <div class="loading-container">
            <div class="loading-bar"></div>
        </div>
    </div>

</body>
</html>
