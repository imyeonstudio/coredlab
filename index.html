<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>COREDLAB | 점검 중</title>
  <meta name="description" content="코어드랩 홈페이지 점검 중입니다." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- 두꺼운 한글 타이포용 -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

  <style>
    :root {
      --blue: #2563eb;
      --blue-strong: #1d4ed8;
      --black: #080b12;
      --gray: #8a909c;
      --line: rgba(8, 11, 18, 0.08);
      --glass: rgba(255, 255, 255, 0.68);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--black);
      background: #f8fafc;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100%;
      min-height: 100dvh;
      padding: clamp(18px, 3vw, 36px);
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
      background:
        radial-gradient(circle at 18% 24%, rgba(37, 99, 235, 0.14), transparent 28%),
        radial-gradient(circle at 82% 74%, rgba(37, 99, 235, 0.12), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }

    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      background-image:
        linear-gradient(rgba(8, 11, 18, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(8, 11, 18, 0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 72%);
      opacity: 0.5;
    }

    .page::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: 0.18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");
    }

    .orb {
      position: fixed;
      z-index: -1;
      width: 42vmax;
      height: 42vmax;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.18), transparent 64%);
      filter: blur(14px);
      animation: orb 8s ease-in-out infinite alternate;
    }

    .orb-a {
      top: -22vmax;
      right: -18vmax;
    }

    .orb-b {
      left: -24vmax;
      bottom: -24vmax;
      animation-delay: -2s;
      opacity: 0.8;
    }

    .wrap {
      position: relative;
      width: min(100%, 1120px);
      min-height: calc(100dvh - clamp(36px, 6vw, 72px));
      border: 1px solid var(--line);
      border-radius: clamp(26px, 4vw, 44px);
      background: var(--glass);
      backdrop-filter: blur(28px);
      box-shadow:
        0 32px 100px rgba(15, 23, 42, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      overflow: hidden;
      padding: clamp(26px, 5vw, 64px);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.08), transparent 36%),
        linear-gradient(315deg, rgba(37, 99, 235, 0.07), transparent 42%);
      pointer-events: none;
    }

    .top,
    .content,
    .bottom {
      position: relative;
      z-index: 2;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .meta {
      font-size: clamp(11px, 1.2vw, 13px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      color: rgba(8, 11, 18, 0.42);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: clamp(11px, 1.2vw, 13px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--blue-strong);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--blue);
      animation: pulse 1.7s ease-in-out infinite;
    }

    .content {
      display: flex;
      align-items: center;
      padding: clamp(54px, 9vh, 96px) 0;
    }

    .text {
      width: 100%;
      max-width: 820px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: clamp(18px, 3vw, 28px);
      color: var(--blue);
      font-size: clamp(12px, 1.4vw, 15px);
      font-weight: 900;
      letter-spacing: -0.04em;
      opacity: 0;
      animation: reveal 0.8s ease forwards;
    }

    .kicker::before {
      content: "";
      width: clamp(34px, 6vw, 78px);
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left;
      animation: line 1s cubic-bezier(.16, 1, .3, 1) forwards;
      animation-delay: 0.15s;
    }

    h1 {
      font-size: clamp(44px, 7.7vw, 104px);
      line-height: 0.94;
      letter-spacing: -0.085em;
      font-weight: 900;
      word-break: keep-all;
    }

    h1 .line {
      display: block;
      overflow: hidden;
      padding-bottom: 0.08em;
    }

    h1 .line span {
      display: inline-block;
      transform: translateY(110%) rotate(1.5deg);
      animation: titleIn 1.05s cubic-bezier(.16, 1, .3, 1) forwards;
    }

    h1 .line:nth-child(2) span {
      animation-delay: 0.13s;
    }

    .blue {
      color: var(--blue);
    }

    .desc {
      margin-top: clamp(20px, 3vw, 32px);
      max-width: 440px;
      font-size: clamp(15px, 1.7vw, 19px);
      line-height: 1.65;
      letter-spacing: -0.045em;
      font-weight: 700;
      color: rgba(8, 11, 18, 0.52);
      word-break: keep-all;
      opacity: 0;
      transform: translateY(14px);
      animation: reveal 0.9s ease forwards;
      animation-delay: 0.72s;
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr minmax(170px, 260px);
      gap: clamp(20px, 4vw, 42px);
      align-items: end;
    }

    .ticker {
      overflow: hidden;
      border-top: 1px solid rgba(8, 11, 18, 0.08);
      padding-top: clamp(16px, 2vw, 22px);
    }

    .ticker-track {
      display: flex;
      width: max-content;
      gap: 14px;
      animation: ticker 20s linear infinite;
    }

    .ticker span {
      white-space: nowrap;
      font-size: clamp(12px, 1.3vw, 14px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.045em;
      color: rgba(8, 11, 18, 0.22);
    }

    .bar-box {
      padding-top: clamp(16px, 2vw, 22px);
      border-top: 1px solid rgba(8, 11, 18, 0.08);
    }

    .bar-text {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 11px;
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: rgba(8, 11, 18, 0.34);
    }

    .bar-text strong {
      color: var(--blue);
    }

    .bar {
      position: relative;
      height: 7px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(37, 99, 235, 0.12);
    }

    .bar::before {
      content: "";
      position: absolute;
      top: 0;
      left: -45%;
      width: 45%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), #60a5fa);
      animation: loading 2.2s cubic-bezier(.65, 0, .35, 1) infinite;
    }

    .ghost {
      position: absolute;
      right: -0.08em;
      bottom: -0.13em;
      z-index: 1;
      font-size: clamp(92px, 20vw, 280px);
      line-height: 0.8;
      font-weight: 900;
      letter-spacing: -0.11em;
      color: rgba(37, 99, 235, 0.045);
      pointer-events: none;
      animation: breathe 5s ease-in-out infinite;
    }

    @keyframes titleIn {
      to {
        transform: translateY(0) rotate(0);
      }
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes line {
      to {
        transform: scaleX(1);
      }
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.24);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(37, 99, 235, 0);
      }
    }

    @keyframes ticker {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-50%);
      }
    }

    @keyframes loading {
      0% {
        left: -45%;
      }
      55%, 100% {
        left: 100%;
      }
    }

    @keyframes breathe {
      0%, 100% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      50% {
        transform: translateY(-8px) scale(1.02);
        opacity: 0.72;
      }
    }

    @keyframes orb {
      from {
        transform: translate3d(0, 0, 0) scale(1);
      }
      to {
        transform: translate3d(-28px, 24px, 0) scale(1.08);
      }
    }

    @media (max-width: 760px) {
      body {
        overflow: hidden;
      }

      .page {
        min-height: 100dvh;
        padding: 12px;
      }

      .wrap {
        min-height: calc(100dvh - 24px);
        border-radius: 26px;
        padding: 24px;
      }

      .top {
        align-items: flex-start;
      }

      .content {
        padding: 52px 0 44px;
        align-items: center;
      }

      h1 {
        font-size: clamp(42px, 14vw, 74px);
        line-height: 0.96;
        letter-spacing: -0.085em;
      }

      .desc {
        max-width: 310px;
        font-size: 15px;
        line-height: 1.58;
      }

      .bottom {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .bar-box {
        max-width: 100%;
      }

      .ghost {
        right: -0.18em;
        bottom: 0.02em;
        font-size: clamp(100px, 34vw, 170px);
      }
    }

    @media (max-width: 390px) {
      .wrap {
        padding: 22px;
      }

      .content {
        padding: 44px 0 38px;
      }

      h1 {
        font-size: clamp(38px, 13.5vw, 58px);
      }

      .desc {
        font-size: 14px;
      }

      .meta,
      .status {
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>

    <section class="wrap" aria-label="코어드랩 점검 안내">
      <div class="ghost">CORE</div>

      <header class="top">
        <p class="meta">COREDLAB</p>

        <div class="status">
          <span class="dot"></span>
          <span>MAINTENANCE</span>
        </div>
      </header>

      <main class="content">
        <div class="text">
          <p class="kicker">SYSTEM UPDATE</p>

          <h1>
            <span class="line"><span>잠시</span></span>
            <span class="line"><span><span class="blue">점검 중</span>입니다.</span></span>
          </h1>

          <p class="desc">
            더 안정적인 화면으로 정리하고 있습니다.<br>
            이용에 불편을 드려 죄송합니다. ( 예상 종료 시간 : 22:00 )<br>
            점검 시간은 조기에 종료될 수 있습니다.
          </p>
        </div>
      </main>

      <footer class="bottom">
        <div class="ticker" aria-hidden="true">
          <div class="ticker-track">
            <span>COREDLAB</span><span>—</span>
            <span>SYSTEM UPDATE</span><span>—</span>
            <span>BLUE POINT</span><span>—</span>
            <span>COMING SOON</span><span>—</span>
            <span>COREDLAB</span><span>—</span>
            <span>SYSTEM UPDATE</span><span>—</span>
            <span>BLUE POINT</span><span>—</span>
            <span>COMING SOON</span><span>—</span>
          </div>
        </div>

        <div class="bar-box">
          <div class="bar-text">
            <span>STATUS</span>
            <strong>RUNNING</strong>
          </div>
          <div class="bar"></div>
        </div>
      </footer>
    </section>
  </div>
</body>
</html>
